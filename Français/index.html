<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<title>Français — Дім</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell">
  <header class="head">
    <div>
      <div class="crumb">Персональний курс · A1 → B2</div>
      <h1>Parler <em>français</em>, pas à pas.</h1>
      <p class="lede">Словник, граматика, діалоги та квізи з українським перекладом. Прогрес зберігається автоматично.</p>
    </div>
    <div class="meta">
      <span class="k">усього слів</span>
      <span class="v" id="totalWords">—</span>
      <div class="row" style="margin-top:10px;justify-content:flex-end">
        <div>
          <span class="k">вивчено</span>
          <span class="v sm accent" id="totalKnown">—</span>
        </div>
      </div>
    </div>
  </header>

  <div class="row" style="justify-content:space-between;margin-bottom:4px">
    <span class="eyebrow">Обери модуль</span>
    <span class="eyebrow" style="color:var(--rule-2)">8 розділів</span>
  </div>

  <div class="modgrid" id="modules"></div>

  <div class="rule-soft"></div>

  <div class="panel">
    <div class="row" style="justify-content:space-between;align-items:baseline;margin-bottom:14px">
      <h2>Слово дня</h2>
      <span class="eyebrow" id="wotdDate"></span>
    </div>
    <div class="wotd">
      <div>
        <div class="w" id="wotdFr">—</div>
        <div class="u" id="wotdUa">—</div>
        <div class="m" id="wotdMeta">—</div>
      </div>
      <button class="ctrl sp" id="wotdPlay" title="Прослухати">🔊</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="shared.js"></script>
<script>
renderChrome('index');

const modules = [
  {href:'flashcards.html', num:'01', title:'Картки',    tint:'blush',
    desc:'Інтерактивний словник з вимовою. Перегортай та позначай.', cnt:()=>allWords().length+' слів'},
  {href:'quiz.html',       num:'02', title:'Квіз',       tint:'mint',
    desc:'Чотири режими: вибір, введення, слух, зворотний переклад.', cnt:()=>'4 режими'},
  {href:'phrases.html',    num:'03', title:'Фрази',      tint:'peach',
    desc:'Готові фрази для кафе, готелю, магазину, знайомства, SOS.', cnt:()=>Object.keys(PHRASES).length+' ситуацій'},
  {href:'dialogues.html',  num:'04', title:'Діалоги',    tint:'sky',
    desc:'Живі сцени — кав\'ярня, готель, лікар, співбесіда.',      cnt:()=>DIALOGUES.length+' сцен'},
  {href:'verbs.html',      num:'05', title:'Дієслова',   tint:'butter',
    desc:'25 ключових дієслів у présent, passé, imparfait, futur.',  cnt:()=>VERBS.length+' дієслів'},
  {href:'grammar.html',    num:'06', title:'Граматика',  tint:'lilac',
    desc:'Артиклі, часи, заперечення, conditionnel, subjonctif.',    cnt:()=>GRAMMAR.length+' тем'},
  {href:'datetime.html',   num:'07', title:'Час і дата', tint:'mint',
    desc:'Дні, місяці, пори року, годинник — як сказати правильно.', cnt:()=>'дні · місяці · години'},
];

document.getElementById('modules').innerHTML = modules.map(m=>`
  <a class="modtile tint-${m.tint}" href="${m.href}">
    <div class="top">
      <div class="ico">${m.num}</div>
      <span class="eyebrow">модуль</span>
    </div>
    <div>
      <h3>${m.title}</h3>
      <p>${m.desc}</p>
    </div>
    <div class="foot">
      <span class="cnt">${m.cnt()}</span>
      <span class="arrow">→</span>
    </div>
  </a>
`).join('');

const all = allWords();
document.getElementById('totalWords').textContent = all.length;
let known = 0;
for(const p of ['flashcards','quiz']) known += (Progress.get(p).known||[]).length;
document.getElementById('totalKnown').textContent = known;

const day = Math.floor(Date.now()/86400000);
const w = all[day % all.length];
document.getElementById('wotdFr').textContent = w.fr;
document.getElementById('wotdUa').textContent = w.ua;
document.getElementById('wotdMeta').textContent = `${w.level} · ${w.t}`;
document.getElementById('wotdDate').textContent = new Date().toLocaleDateString('uk-UA',{day:'numeric',month:'long'});
document.getElementById('wotdPlay').onclick = ()=>speakFR(w.fr);
</script>
</body>
</html>
